name: Keep Streamlit app awake

on:
  workflow_dispatch:
  schedule:
    # Streamlit Community Cloud hibernates inactive apps. Ping every 6 hours.
    - cron: "0 */6 * * *"

jobs:
  ping-streamlit:
    runs-on: ubuntu-latest
    steps:
      - name: Ping sellerlookup Streamlit app
        run: |
          curl --fail --location --silent --show-error \
            --retry 3 \
            --retry-delay 20 \
            --max-time 120 \
            https://sellerlookup.streamlit.app/ > /dev/null
